  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # ── Qdrant ───────────────────────────────────────────────────────────────────
  # Already running locally — keep for reference.
  # If already running on 6333/6334, comment this block out.

  # qdrant:
  #   image: qdrant/qdrant:latest
  #   container_name: visuallearning-qdrant
  #   restart: unless-stopped
  #   ports:
  #     - "6333:6333"   # REST + dashboard  →  http://localhost:6333/dashboard
  #     - "6334:6334"   # gRPC (used by .NET Qdrant.Client)
  #   volumes:
  #     - qdrantdata:/qdrant/storage
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  # New dependency for Phase 4. Start with: docker compose up -d rabbitmq
  # Management UI  →  http://localhost:15672  (dev / dev)

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: visuallearning-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: dev
      RABBITMQ_DEFAULT_PASS: dev
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Ollama ───────────────────────────────────────────────────────────────────
  # Already running locally. Comment out if you run Ollama natively.
  # After first start, pull models:
  #   docker exec visuallearning-ollama ollama pull gemma3:4b
  #   docker exec visuallearning-ollama ollama pull qwen2.5-coder:7b
  #   docker exec visuallearning-ollama ollama pull nomic-embed-text

  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: visuallearning-ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollamadata:/root/.ollama
  #   # GPU support — uncomment if you have an NVIDIA GPU + nvidia-container-toolkit
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: 1
  #   #           capabilities: [gpu]
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -sf http://localhost:11434/ || exit 1"]
  #     interval: 15s
  #     timeout: 10s
  #     retries: 5

  # ── Piper TTS ────────────────────────────────────────────────────────────────
  # New dependency for Phase 4 narration.
  # After first start, download the voice model:
  #   docker exec visuallearning-piper piper --download-dir /data en_US-lessac-medium

  piper:
    image: rhasspy/wyoming-piper:latest
    container_name: visuallearning-piper
    restart: unless-stopped
    ports:
      - "10200:10200"
    volumes:
      - piperdata:/data
    command: >
      --voice en_US-lessac-medium
      --data-dir /data
      --download-dir /data

  # ── ffmpeg (video generation) ────────────────────────────────────────────────
  # Runs as a persistent sidecar; the Python AI service calls it via HTTP on port 8080.
  # Endpoint: POST /run  body: { args: [...ffmpeg args...] }
  # We use linuxserver/ffmpeg which accepts commands via environment/entrypoint.
  # Actually used via `docker run --rm` one-shot — this entry just pre-pulls the image.
  ffmpeg:
    image: linuxserver/ffmpeg:latest
    container_name: visuallearning-ffmpeg
    entrypoint: ["tail", "-f", "/dev/null"]   # keep container alive for exec
    restart: unless-stopped
    volumes:
      - ffmpegoutput:/out

  # ── Blender (headless 3D rendering) ─────────────────────────────────────────
  # New dependency for Phase 4 3D generation.
  # Invoked headlessly by the Python AI service via subprocess.
  # The python-ai service shares the /output volume to pick up rendered GLB files.

  blender:
    image: linuxserver/blender:latest
    container_name: visuallearning-blender
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    ports:
      - "3010:3010"   # noVNC web UI (optional, for render debugging)
    volumes:
      - blenderdata:/config
      - blenderoutput:/output

