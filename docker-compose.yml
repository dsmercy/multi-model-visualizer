# ─────────────────────────────────────────────────────────────────────────────
# AI Visual Learning Platform — Docker Compose
#
# DEV MODE (current): only infrastructure services run here.
# The API, Python AI service, and frontend are run locally:
#   API          →  cd api && dotnet run --urls http://localhost:5000
#   Python AI    →  cd python-ai-service && uvicorn main:app --port 8000
#   Frontend     →  cd frontend && npm run dev
#
# PRODUCTION (future): uncomment the api, python-ai, and frontend service
# blocks at the bottom of this file.
# ─────────────────────────────────────────────────────────────────────────────

services:

